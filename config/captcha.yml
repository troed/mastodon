shared:
  provider: <%= ENV.fetch('CAPTCHA_PROVIDER', 'hcaptcha').to_s.downcase %>
  secret_key: <%= ENV.fetch('CAPTCHA_PROVIDER', 'hcaptcha').to_s.downcase == 'turnstile' ? ENV.fetch('TURNSTILE_SECRET_KEY', nil) : ENV.fetch('HCAPTCHA_SECRET_KEY', nil) %>
  site_key: <%= ENV.fetch('CAPTCHA_PROVIDER', 'hcaptcha').to_s.downcase == 'turnstile' ? ENV.fetch('TURNSTILE_SITE_KEY', nil) : ENV.fetch('HCAPTCHA_SITE_KEY', nil) %>
